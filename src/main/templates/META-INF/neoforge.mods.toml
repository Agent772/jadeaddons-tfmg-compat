modLoader="javafml" 
loaderVersion="${loader_version_range}" 
license="${mod_license}"

# A URL to refer people to when problems occur with this mod
issueTrackerURL="https://github.com/Agent772/tfmg-goggles/issues" #optional

# A list of mods - how many allowed here is determined by the individual mod loader
[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/Agent772/tfmg-goggles"
credits="Creators of Create, TFMG, Jade, NeoForge, and all other awesome tools that made this possible." #optional
authors="${mod_authors}" #optional

# The description text for the mod (multi line!) (#mandatory)
description='''${mod_description}'''


[[dependencies.${mod_id}]]
    modId="neoforge" 
    type="required" 
    versionRange="[${neo_version},)" 
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="${create_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jade"
    type="required"
    versionRange="${jade_version_range}"
    ordering="AFTER"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="tfmg"
    type="required"
    versionRange="${tfmg_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jadeaddons"
    type="required"
    versionRange="${jade_addons_version_range}"
    ordering="AFTER"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="curios"
    type="optional"
    versionRange="[9.0.0,)"
    ordering="AFTER"
    side="BOTH"


